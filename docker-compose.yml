version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - backend