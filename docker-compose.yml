version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - ./backend/config.json:/app/config.json
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_INTERNAL_URL=http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 64M
