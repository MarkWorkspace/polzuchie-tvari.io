<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base watermelon gradient (light source from top-left) -->
    <radialGradient id="melonBody" cx="40%" cy="40%" r="60%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#66bb6a" />
      <stop offset="40%" stop-color="#4caf50" />
      <stop offset="80%" stop-color="#2e7d32" />
      <stop offset="100%" stop-color="#1b5e20" />
    </radialGradient>
    
    <!-- Stripe gradient -->
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3314" />
      <stop offset="100%" stop-color="#031a08" />
    </linearGradient>

    <!-- Gloss highlight gradient -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Shadow below the watermelon -->
  <ellipse cx="32" cy="58" rx="20" ry="4" fill="#000000" opacity="0.25" />

  <!-- Base melon shape -->
  <ellipse cx="32" cy="31" rx="28" ry="26" fill="url(#melonBody)" />
  
  <!-- Stripes group, clipped to the ellipse -->
  <clipPath id="melonClip">
    <ellipse cx="32" cy="31" rx="28" ry="26" />
  </clipPath>
  
  <g clip-path="url(#melonClip)" stroke="url(#stripeGrad)" fill="none" stroke-linecap="round">
    <!-- Center stripe -->
    <path d="M 32,0 Q 34,31 32,62" stroke-width="4.5" />
    <!-- Inner stripes -->
    <path d="M 18,2 Q 22,31 18,60" stroke-width="4" />
    <path d="M 46,2 Q 42,31 46,60" stroke-width="4" />
    <!-- Outer stripes -->
    <path d="M 6,10 Q 14,31 6,52" stroke-width="3" />
    <path d="M 58,10 Q 50,31 58,52" stroke-width="3" />
    
    <!-- Secondary thin stripes for texture -->
    <g stroke="#1b5e20" stroke-width="1.5" opacity="0.8">
      <path d="M 25,1 Q 28,31 25,61" />
      <path d="M 39,1 Q 36,31 39,61" />
      <path d="M 12,5 Q 18,31 12,57" />
      <path d="M 52,5 Q 46,31 52,57" />
    </g>
  </g>

  <!-- Inner shadow to make it a sphere (darker around edges) -->
  <ellipse cx="32" cy="31" rx="28" ry="26" fill="none" stroke="#0d3314" stroke-width="2" opacity="0.6" />
  <ellipse cx="32" cy="31" rx="28" ry="26" fill="url(#glossGrad)" />
  
  <!-- Sharp glossy highlight -->
  <ellipse cx="20" cy="16" rx="8" ry="4" fill="#ffffff" opacity="0.6" transform="rotate(-35 20 16)" />
  <ellipse cx="14" cy="22" rx="3" ry="1.5" fill="#ffffff" opacity="0.4" transform="rotate(-50 14 22)" />
</svg>
