<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="piBody" cx="0.45" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </radialGradient>
    <radialGradient id="piHigh" cx="0.35" cy="0.3" r="0.2">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="piShadow" cx="0.5" cy="0.9" r="0.35">
      <stop offset="0%" stop-color="#78350f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#78350f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="piLeaf" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
