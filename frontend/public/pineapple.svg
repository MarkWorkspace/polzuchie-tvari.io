    <line x1="30" y1="22" x2="44" y2="52"/>
    <line x1="36" y1="22" x2="46" y2="42"/>
    <line x1="40" y1="26" x2="46" y2="36"/>
    <!-- Diagonal lines going left -->
    <line x1="44" y1="30" x2="32" y2="58"/>
    <line x1="40" y1="24" x2="26" y2="58"/>
    <line x1="34" y1="22" x2="20" y2="52"/>
    <line x1="28" y1="22" x2="18" y2="42"/>
    <line x1="24" y1="26" x2="18" y2="36"/>
  </g>
  <!-- Diamond dot accents -->
  <g fill="#92400e" opacity="0.4">
    <circle cx="27" cy="30" r="0.8"/>
    <circle cx="37" cy="30" r="0.8"/>
    <circle cx="24" cy="37" r="0.8"/>
    <circle cx="32" cy="35" r="0.8"/>
    <circle cx="40" cy="37" r="0.8"/>
    <circle cx="27" cy="43" r="0.8"/>
    <circle cx="37" cy="43" r="0.8"/>
    <circle cx="32" cy="49" r="0.8"/>
    <circle cx="24" cy="49" r="0.8"/>
    <circle cx="40" cy="49" r="0.8"/>
    <circle cx="29" cy="55" r="0.8"/>
    <circle cx="35" cy="55" r="0.8"/>
  </g>
  <!-- Shadow -->
