  <!-- Highlight -->
  <ellipse cx="27" cy="32" rx="5" ry="8" fill="url(#piHigh)"/>
  <!-- Crown leaves -->
  <g fill="url(#piLeaf)">
    <!-- Center leaf -->
    <path d="M32 22 Q33 12 32 4 Q31 12 32 22 Z" fill="#22c55e"/>
    <path d="M32 22 Q34 14 35 6 Q32 14 31 22 Z" fill="#16a34a"/>
    <!-- Left leaves -->
    <path d="M30 23 Q25 14 20 8 Q26 14 30 23 Z" fill="#22c55e"/>
    <path d="M28 24 Q22 16 17 12 Q23 17 28 24 Z" fill="#15803d"/>
    <path d="M27 25 Q20 20 15 18 Q21 21 27 25 Z" fill="#16a34a" opacity="0.8"/>
    <!-- Right leaves -->
    <path d="M34 23 Q39 14 44 8 Q38 14 34 23 Z" fill="#22c55e"/>
    <path d="M36 24 Q42 16 47 12 Q41 17 36 24 Z" fill="#15803d"/>
    <path d="M37 25 Q44 20 49 18 Q43 21 37 25 Z" fill="#16a34a" opacity="0.8"/>
  </g>
  <!-- Leaf highlights -->
  <path d="M32 20 Q32.5 14 32 6" fill="none" stroke="#4ade80" stroke-width="0.4" opacity="0.6"/>
  <path d="M29 23 Q24 15 21 10" fill="none" stroke="#4ade80" stroke-width="0.3" opacity="0.5"/>
  <path d="M35 23 Q40 15 43 10" fill="none" stroke="#4ade80" stroke-width="0.3" opacity="0.5"/>
